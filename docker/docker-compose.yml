# ===================================
# A股自选股智能分析系统 - Docker Compose
# ===================================
# 
# 使用方式:
#   定时模式: docker-compose -f ./docker/docker-compose.yml up -d
#   FastAPI模式: docker-compose -f ./docker/docker-compose.yml up -d server
#   同时启动: docker-compose -f ./docker/docker-compose.yml up -d analyzer server

name: daily-stock-analysis
version: '3.8'

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped

  # 环境变量（从 .env 文件加载）。不要将 ../.env 作为单文件 volume 挂载到 /app/.env，
  # 否则 Docker mount point 会阻止配置保存时的 os.replace 原子更新。
  env_file:
    - ../.env

  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../strategies:/app/strategies:ro
    # Longbridge OAuth token cache persistence; entrypoint repairs container-side ownership for dsa user.
    # Create ../longbridge_tokens on the host before copying an authorized token cache into it.
    - ../longbridge_tokens:/home/dsa/.longbridge
    # 如需覆盖前端静态资源，可挂载本地 static 目录
    # - ../static:/app/static:ro

  environment:
    - TZ=Asia/Shanghai

    # Web/API service bind address (must be 0.0.0.0 inside container)
    - WEBUI_HOST=0.0.0.0
    # API_PORT 从 .env 文件读取，无需在此硬编码
    # Docker 内网服务名与国内财经数据源默认走直连，避免 server -> searxng 或东财/腾讯/新浪链路被代理误转发。
    - NO_PROXY=localhost,127.0.0.1,searxng,stock-searxng,server,stock-server,analyzer,stock-analyzer,web,stock-web,eastmoney.com,.eastmoney.com,push2.eastmoney.com,push2his.eastmoney.com,anonflow2.eastmoney.com,fund.eastmoney.com,sina.com.cn,.sina.com.cn,hq.sinajs.cn,163.com,.163.com,tushare.pro,api.tushare.pro,baostock.com,sse.com.cn,szse.cn,csindex.com.cn,cninfo.com.cn,qt.gtimg.cn,sqt.gtimg.cn,ifzq.gtimg.cn
    - no_proxy=localhost,127.0.0.1,searxng,stock-searxng,server,stock-server,analyzer,stock-analyzer,web,stock-web,eastmoney.com,.eastmoney.com,push2.eastmoney.com,push2his.eastmoney.com,anonflow2.eastmoney.com,fund.eastmoney.com,sina.com.cn,.sina.com.cn,hq.sinajs.cn,163.com,.163.com,tushare.pro,api.tushare.pro,baostock.com,sse.com.cn,szse.cn,csindex.com.cn,cninfo.com.cn,qt.gtimg.cn,sqt.gtimg.cn,ifzq.gtimg.cn

    # 代理设置（如果需要）
    # - http_proxy=http://host.docker.internal:10809
    # - https_proxy=http://host.docker.internal:10809
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  # 资源限制
  deploy:
    resources:
      limits:
        memory: 1G
      reservations:
        memory: 512M

services:
  # 私有 SearXNG 搜索服务，仅供本 Compose 内部访问，不暴露公网端口。
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: stock-searxng
    restart: unless-stopped
    env_file:
      - ../.env
    entrypoint:
      - /bin/sh
      - -c
      - |
        python - <<'PY'
        import os
        from pathlib import Path

        template = Path("/etc/searxng/settings.yml").read_text(encoding="utf-8").rstrip() + "\n"
        proxy = (
            os.environ.get("SEARXNG_OUTGOING_PROXY")
            or os.environ.get("https_proxy")
            or os.environ.get("HTTPS_PROXY")
            or os.environ.get("http_proxy")
            or os.environ.get("HTTP_PROXY")
            or ""
        ).strip()

        lines = [template, "outgoing:", "  request_timeout: 10.0", "  max_request_timeout: 20.0"]
        if proxy:
            lines.append(f"  proxies: {proxy}")

        Path("/tmp/searxng-settings.yml").write_text("\n".join(lines) + "\n", encoding="utf-8")
        PY
        export SEARXNG_SETTINGS_PATH=/tmp/searxng-settings.yml
        exec /usr/local/searxng/entrypoint.sh
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
      - SEARXNG_BIND_ADDRESS=0.0.0.0
      - SEARXNG_PORT=8080
    volumes:
      - ./searxng:/etc/searxng:ro
      - searxng-cache:/var/cache/searxng
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 定时任务模式
  analyzer:
    <<: *common
    container_name: stock-analyzer
    depends_on:
      - searxng

  # FastAPI 模式
  server:
    <<: *common
    container_name: stock-server
    depends_on:
      - searxng
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "${API_PORT:-8000}"]
    # 若使用 network_mode: host，则以下 ports 映射无效，端口由 command 中的 --port 指定
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"

  web:
    image: nginx:1.27-alpine
    container_name: stock-web
    depends_on:
      - server
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  searxng-cache:
